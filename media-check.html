<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Version 14 Media Check</title><style>body{font-family:system-ui;margin:0;background:#f5f2eb;color:#17251f}main{max-width:980px;margin:auto;padding:32px 20px}h1{margin-bottom:6px}button{padding:12px 18px;border:0;border-radius:6px;background:#17251f;color:white;font-weight:700}table{width:100%;border-collapse:collapse;margin-top:22px;background:white}th,td{padding:11px;border-bottom:1px solid #ddd;text-align:left;word-break:break-all}.ok{color:#08752d;font-weight:800}.bad{color:#b00020;font-weight:800}code{background:#eee;padding:2px 5px}</style><script defer src="property-config.js"></script></head><body><main><h1>Property Media Check</h1><p>This page tests the exact Version 14 paths before launch. Green means the deployed file exists.</p><button id="run">Run media check</button><table><thead><tr><th>Media</th><th>Path</th><th>Status</th></tr></thead><tbody id="results"></tbody></table></main><script>
const tbody=document.getElementById('results');
async function test(label,path,type){const tr=document.createElement('tr');tr.innerHTML=`<td>${label}</td><td><code>${path}</code></td><td>Checking…</td>`;tbody.appendChild(tr);try{const opts=type==='video'?{headers:{Range:'bytes=0-1023'}}:{};const r=await fetch(path,opts);const ok=r.ok||r.status===206;tr.lastElementChild.textContent=ok?`OK (${r.status})`:`Missing (${r.status})`;tr.lastElementChild.className=ok?'ok':'bad'}catch(e){tr.lastElementChild.textContent='Failed';tr.lastElementChild.className='bad'}}
async function run(){tbody.innerHTML='';const p=window.PROPERTY_DATA;const v=f=>`${p.assetBase}/${f}?v=${p.version}`;await test('Hero',v(p.hero),'image');for(const photo of p.photos)await test(photo.alt,v(photo.file),'image');await test('Video poster',v(p.videoPoster),'image');await test('Walkthrough',v(p.video),'video')}
document.getElementById('run').addEventListener('click',run);run();</script></body></html>
